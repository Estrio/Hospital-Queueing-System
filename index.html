<!DOCTYPE html>
<html lang="en">
<head>
  <title>Clerk Panel — Twin Care Hospital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <img src="./assets/TWIN CARE HOSPITAL.png" alt="Twin Care Hospital Logo" class="logo">
    <div class="header-text">
      <div class="header-title">Twin Care Hospital Incorporated</div>
      <div class="header-sub">Clerk Station · Queue Management</div>
    </div>
    <div class="header-actions">
      <div class="last-ticket-chip">
        <span class="last-ticket-label">LAST TICKET</span>
        <span class="last-ticket-value" id="lastTicket">—</span>
      </div>
      <button class="add-btn" id="openAddDoctorBtn">＋ Add Doctor</button>
    </div>
  </header>

  <!-- DOCTOR CARDS -->
  <main class="container">
    <div class="cards" id="doctorContainer"></div>
  </main>

  <!-- ═══ MODAL: ADD DOCTOR ══════════════════════════════ -->
  <div class="modal" id="addDoctorModal">
    <div class="modal-content">
      <button class="modal-close" data-close="addDoctorModal">&#x2715;</button>
      <div class="modal-icon">🩺</div>
      <h2 class="modal-title">Add Doctor</h2>
      <p class="modal-sub">Fill in the doctor's details to register them.</p>
      <input id="docRoom"      class="modal-input" placeholder="Room Number">
      <input id="docName"      class="modal-input" placeholder="Doctor Name">
      <input id="docSpecialty" class="modal-input" placeholder="Specialty">
      <input id="docPrefix"    class="modal-input" placeholder="Ticket Prefix (A, B, C…)">
      <button class="modal-btn" id="saveDocBtn">Add Doctor</button>
    </div>
  </div>

  <!-- ═══ MODAL: GENERATE TICKET ════════════════════════ -->
  <div class="modal" id="ticketModal">
    <div class="modal-content">
      <button class="modal-close" data-close="ticketModal">&#x2715;</button>
      <div class="modal-icon">🎫</div>
      <h2 class="modal-title">Generate Ticket</h2>
      <p class="modal-sub" id="ticketModalSub">Enter the patient's full name.</p>
      <input
        type="text"
        id="patientName"
        class="modal-input"
        placeholder="Patient Full Name"
        autocomplete="off"
      >
      <button class="modal-btn" id="confirmTicketBtn">Print &amp; Issue Ticket</button>
    </div>
  </div>

  <!-- ═══ MODAL: VIEW QUEUE ══════════════════════════════ -->
  <div class="modal" id="queueModal">
    <div class="modal-content modal-content--list">
      <button class="modal-close" data-close="queueModal">&#x2715;</button>
      <div class="modal-icon">📋</div>
      <h2 class="modal-title" id="queueModalTitle">Queue</h2>
      <div class="modal-list" id="queueList"></div>
    </div>
  </div>

  <!-- ═══ MODAL: RESTORE MISSED ══════════════════════════ -->
  <div class="modal" id="restoreModal">
    <div class="modal-content modal-content--list">
      <button class="modal-close" data-close="restoreModal">&#x2715;</button>
      <div class="modal-icon">♻️</div>
      <h2 class="modal-title">Restore Missed Patient</h2>
      <div class="modal-list" id="restoreList"></div>
    </div>
  </div>

  <script type="module" src="./js/index.js"></script>
</body>
</html>
