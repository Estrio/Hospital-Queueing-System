<!DOCTYPE html>
<html>
<head>
  <title>Guard Panel — Twin Care Hospital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <img src="./assets/TWIN CARE HOSPITAL.png" alt="Twin Care Hospital Logo" class="logo">
    <div class="header-text">
      <div class="header-title">Twin Care Hospital Incorporated</div>
      <div class="header-sub">Guard Station · Ticket Issuance</div>
    </div>
  </header>

  <!-- LAST TICKET BANNER -->
  <div class="last-ticket-bar">
    <span class="last-ticket-label">LAST ISSUED</span>
    <span class="last-ticket-value" id="lastTicket">—</span>
  </div>

  <!-- DOCTOR CARDS -->
  <main class="container">
    <div class="cards" id="doctorCards"></div>
  </main>

  <!-- PATIENT MODAL -->
  <div class="modal" id="patientModal">
    <div class="modal-content">

      <button class="modal-close" id="closeModal" aria-label="Close">&#x2715;</button>

      <div class="modal-icon">🎫</div>

      <h2 class="modal-title">Generate Ticket</h2>
      <p class="modal-sub" id="modalSub">Enter the patient's full name.</p>

      <input
        type="text"
        id="patientName"
        class="modal-input"
        placeholder="Patient Full Name"
        autocomplete="off"
      >

      <button class="modal-btn" id="confirmTicketBtn">
        Print & Issue Ticket
      </button>

    </div>
  </div>

  <script type="module" src="./js/index.js"></script>
</body>
</html>
